---
name: Dependabot auto-merge

# This repo's own caller of the org reusable. Self-references the local reusable
# (same repo); other org repos pin it by SHA. See
# docs/onboarding/org/dependabot-automerge-settings.sh for the repo settings
# (allow_auto_merge + branch protection) this depends on.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  automerge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    uses: ./.github/workflows/reusable-dependabot-automerge.yml
    with:
      update-types: patch
    secrets:
      app-private-key: ${{ secrets.MIF_CI_CLIENT_APP_PRIVATE_KEY }}
