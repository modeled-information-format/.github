# Reusable workflow: OpenSSF Scorecard — supply-chain posture.
#
# Scores 0-10 heuristics (Branch-Protection, Code-Review, Token-Permissions,
# Dangerous-Workflow, Pinned-Dependencies, Signed-Releases, ...) and uploads
# SARIF to the code-scanning hub. With publish-results: true the run is
# published to the OpenSSF REST API (a public posture attestation + badge),
# which requires id-token: write.
#
# Recommended trigger in the caller: branch_protection_rule, schedule (weekly),
# and push to the default branch.
#
# Usage:
#   jobs:
#     scorecard:
#       permissions:
#         security-events: write
#         id-token: write
#         contents: read
#         actions: read
#       uses: modeled-information-format/.github/.github/workflows/reusable-scorecard.yml@<sha>

name: scorecard

on:
  workflow_call:
    inputs:
      publish-results:
        description: 'Publish results to the OpenSSF API (public repos only)'
        required: false
        type: boolean
        default: true
    secrets:
      app-private-key:
        description: >-
          Private key of the org CI GitHub App (its Client ID is in
          vars.MIF_CI_CLIENT_APP_ID). When provided, Scorecard reads branch
          protection via an App installation token (administration:read), so the
          Branch-Protection check is scored from real settings rather than the
          incomplete data the default GITHUB_TOKEN can see. Omit to fall back to
          GITHUB_TOKEN (Branch-Protection then limited).
        required: false
    outputs:
      sarif-artifact:
        description: 'Artifact name holding the SARIF evidence (attestation seam)'
        value: scorecard-sarif
      sarif-filename:
        description: 'SARIF filename within the artifact'
        value: scorecard.sarif

permissions:
  contents: read

jobs:
  analysis:
    name: analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF
      id-token: write          # publish to OpenSSF API
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Mint an org CI App installation token so Scorecard can read branch
      # protection (administration:read) — the default GITHUB_TOKEN cannot, which
      # caps the Branch-Protection check. Best-effort: if the App is not
      # configured for this caller, fall back to GITHUB_TOKEN below.
        if: ${{ vars.MIF_CI_CLIENT_APP_ID != '' && secrets.app-private-key != '' }}
        with:
          client-id: ${{ vars.MIF_CI_CLIENT_APP_ID }}
          private-key: ${{ secrets.app-private-key }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: ${{ inputs.publish-results }}
          # App token when available (full Branch-Protection read), else GITHUB_TOKEN.
          repo_token: ${{ steps.app-token.outputs.token || github.token }}

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: scorecard.sarif
          category: scorecard

      # Expose the SARIF as a downloadable artifact so the attestation seam
      # (reusable-attest-scan.yml) can sign it bound to a release subject.
      - name: Upload Scorecard SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: scorecard.sarif
          if-no-files-found: error
