# Composite action: attested catalog-updater (core logic + shared verify).
#
# `mode: update`  — verify-first re-pin of every external plugin entry to its
#                   latest attested release, opening zero-touch auto-merge PRs.
# `mode: verify`  — fail-closed verification of every external entry at its
#                   currently pinned ref (the rule catalog-admission shares).
#
# Releases only, never branch HEAD. A bump points at an attested release or it
# does not happen. The engine (catalog_update.py) is stdlib-only and shells to
# `gh`; auth is the token passed in `github-token` (an App installation token in
# the hub, the workflow GITHUB_TOKEN in admission).

name: plugin-catalog-update
description: Verify-first re-pin / fail-closed verify of external plugin catalog entries.

inputs:
  mode:
    description: 'update (re-pin + PR) or verify (fail-closed verify only)'
    required: false
    default: update
  repo:
    description: 'owner/repo of the marketplace being processed'
    required: true
  marketplace-path:
    description: 'Path to marketplace.json within the checkout'
    required: false
    default: .claude-plugin/marketplace.json
  predicate-types:
    description: 'Required predicates: one "<uri> [signer-workflow]" per line. Empty = fail closed.'
    required: false
    default: https://slsa.dev/provenance/v1
  github-token:
    description: 'Token used for gh (App installation token in the hub; GITHUB_TOKEN in admission)'
    required: true
  dry-run:
    description: 'Resolve + verify + render, but open/merge nothing'
    required: false
    default: 'false'
  approve-token:
    description: >-
      Token of a DIFFERENT identity to approve the opened PR with (a bot can
      never approve its own PR). Required whenever the target repo's branch
      protection has required_approving_review_count > 0 — GitHub's
      auto-merge queue waits on that condition regardless of any
      bypass_pull_request_allowances entry for github-token's own App.
      Empty = skip the approval call (verify mode never opens a PR, so this
      is a no-op there either way).
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Configure git identity (bot)
      if: inputs.mode == 'update'
      shell: bash
      run: |
        git config user.name "modeled-information-format-ci[bot]"
        git config user.email "modeled-information-format-ci[bot]@users.noreply.github.com"

    - name: Run catalog-updater engine
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        # Pass inputs via env, never interpolated into the run script, so
        # attacker-controlled values cannot inject shell code (Semgrep
        # run-shell-injection). The script reads them as quoted argv.
        MODE: ${{ inputs.mode }}
        REPO: ${{ inputs.repo }}
        MARKETPLACE_PATH: ${{ inputs.marketplace-path }}
        PREDICATE_TYPES: ${{ inputs.predicate-types }}
        DRY_RUN: ${{ inputs.dry-run }}
        APPROVE_TOKEN: ${{ inputs.approve-token }}
      run: |
        args=(--mode "$MODE" --repo "$REPO" --marketplace "$MARKETPLACE_PATH" --predicates "$PREDICATE_TYPES")
        if [ "$DRY_RUN" = "true" ]; then args+=(--dry-run); fi
        if [ -n "$APPROVE_TOKEN" ]; then args+=(--approve-token "$APPROVE_TOKEN"); fi
        python3 "${GITHUB_ACTION_PATH}/catalog_update.py" "${args[@]}"
